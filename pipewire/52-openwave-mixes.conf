# OpenWave virtual mix sinks.
#
# Creates three persistent null sinks so applications can route audio
# into per-mix destinations:
#
#   - openwave_personal_mix : what you hear (route to your headphones)
#   - openwave_chat_mix     : send to voice apps via Monitor of OpenWave Chat Mix
#   - openwave_record_mix   : send to OBS via Monitor of OpenWave Record Mix
#
# Per-cell mixing through OpenWave's matrix arrives in v0.3.0; until then
# these sinks behave as ordinary virtual outputs.

context.objects = [
    {   factory = adapter
        args = {
            factory.name      = support.null-audio-sink
            node.name         = openwave_personal_mix
            node.description  = "OpenWave Personal Mix"
            media.class       = Audio/Sink
            audio.position    = [ FL FR ]
            object.linger     = true
            monitor.channel-volumes = true
        }
    }
    {   factory = adapter
        args = {
            factory.name      = support.null-audio-sink
            node.name         = openwave_chat_mix
            node.description  = "OpenWave Chat Mix"
            media.class       = Audio/Sink
            audio.position    = [ FL FR ]
            object.linger     = true
            monitor.channel-volumes = true
        }
    }
    {   factory = adapter
        args = {
            factory.name      = support.null-audio-sink
            node.name         = openwave_record_mix
            node.description  = "OpenWave Record Mix"
            media.class       = Audio/Sink
            audio.position    = [ FL FR ]
            object.linger     = true
            monitor.channel-volumes = true
        }
    }
]
